#
# Configuration file for register_with_straightening_to_single_image.py
#
# Registers all images in a dataset to the reference images specified by "fixed_image_bundle_path".
#

dataset_root: '/workspace/data/datasets/NORDSTEN/bids'
fixed_image_bundle_path: '/workspace/data/atlas/healthy/healthy-sub-0004-straightened.nii.gz'
moving_images_query: '`source` == "raw"'
output_derivative_name: 'registered_straightened_single_image'
segmentation_query: '`pipeline` == "totalspineseg" and `additional_suffixes` == "dseg"'
levels_query: '`pipeline` == "totalspineseg" and `additional_suffixes` == "levels"'

pydeform: '/workspace/data/configuration/registration_to_single_image/pydeform.yaml'
